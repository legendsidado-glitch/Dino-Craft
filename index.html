<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Safari 3D: Ultimate Evolution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = {};
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            console.warn("Firebase config not found, running in offline mode.");
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dino-safari-v3-final';

        let scene, camera, renderer, dino, clock;
        let chunks = new Map();
        let mobs = [];
        let otherPlayers = new Map();
        let keys = {};
        let user = null;
        let isEating = false;
        let eatTimer = 0;
        let viewMode = 0; 
        
        const CHUNK_SIZE = 80; 
        const VIEW_DISTANCE = 3; 
        const BLOCK_RES = 8;    
        const STEP = CHUNK_SIZE / BLOCK_RES;

        let inventory = { meat: 0, wood: 0, stone: 0, fish: 0, points: 0 };
        let quests = [
            { id: 'hunt', text: 'Hunt 3 Mobs', target: 3, current: 0, reward: 10, complete: false },
            { id: 'gather', text: 'Gather 10 Wood', target: 10, current: 0, reward: 5, complete: false },
            { id: 'mine', text: 'Mine 5 Stone', target: 5, current: 0, reward: 15, complete: false }
        ];

        let activeBuffs = { speed: 1 };
        let joystick = { active: false, x: 0, y: 0 };

        function getHeight(x, z) {
            const nx = Math.floor(x / STEP) * STEP;
            const nz = Math.floor(z / STEP) * STEP;
            let h = Math.sin(nx * 0.05) * 5 + Math.cos(nz * 0.05) * 5 + (Math.sin(nx * 0.01) * Math.cos(nz * 0.01) * 35);
            
            const v = (Math.sin(x * 0.001) + Math.cos(z * 0.001));
            // Ocean Depths
            if (v < -0.85) h = Math.min(h, -20); 
            // Mountain Highs
            if (v > 0.75) h += 30;

            return Math.floor(h / 4) * 4; 
        }

        function getBiomeAt(x, z) {
            const v = (Math.sin(x * 0.001) + Math.cos(z * 0.001));
            const t = (Math.sin(x * 0.0005) * Math.cos(z * 0.0005));
            
            if (v > 0.75) return { name: "Highlands", ground: 0x7a7a7a, secondary: 0x555555, type: 'mountain' };
            if (v < -0.85) return { name: "Abyss Ocean", ground: 0x1e3d59, secondary: 0x0a1a2a, type: 'ocean' };
            if (t > 0.5) return { name: "Volcanic Crag", ground: 0x221111, secondary: 0xff3300, type: 'volcano' };
            if (v < -0.4) return { name: "Red Desert", ground: 0xd2691e, secondary: 0x8b4513, type: 'desert' };
            
            // Forest with Green Dirt Texture
            return { name: "Ancient Forest", ground: 0x2d5a27, secondary: 0x4a7c2c, type: 'forest' };
        }

        function getBlockMaterial(color, secondary) {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.fillRect(0,0,32,32);
            ctx.fillStyle = '#' + secondary.toString(16).padStart(6, '0');
            // Create blocky texture pattern
            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    if((i+j)%2 === 0) ctx.fillRect(i*8, j*8, 8, 8);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            return new THREE.MeshStandardMaterial({ map: tex });
        }

        async function initMultiplayer() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, (userData) => {
                    user = userData;
                    if (user) {
                        const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
                        onSnapshot(playersCol, (snapshot) => {
                            snapshot.docChanges().forEach((change) => {
                                const data = change.doc.data();
                                if (change.doc.id === user.uid) return;
                                if (change.type === "added" || change.type === "modified") updateRemotePlayer(change.doc.id, data);
                                else if (change.type === "removed") removeRemotePlayer(change.doc.id);
                            });
                        }, (e) => console.error(e));
                    }
                });
            } catch (e) { console.error(e); }
        }

        function updateRemotePlayer(id, data) {
            if (!otherPlayers.has(id)) {
                const pDino = createDinoModel(data.color || 0x4a5d23);
                scene.add(pDino);
                otherPlayers.set(id, pDino);
            }
            const pDino = otherPlayers.get(id);
            pDino.position.set(data.x, data.y, data.z);
            pDino.rotation.y = data.ry;
        }

        function removeRemotePlayer(id) {
            if (otherPlayers.has(id)) {
                scene.remove(otherPlayers.get(id));
                otherPlayers.delete(id);
            }
        }

        async function syncPlayerData() {
            if (!user || !dino) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
                    x: dino.position.x, y: dino.position.y, z: dino.position.z, ry: dino.rotation.y, timestamp: Date.now()
                }, { merge: true });
            } catch (e) {}
        }

        function updateQuest(id, amount) {
            const q = quests.find(q => q.id === id);
            if(q && !q.complete) {
                q.current += amount;
                if(q.current >= q.target) {
                    q.complete = true;
                    inventory.points += q.reward;
                }
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('meat-count').innerText = inventory.meat;
            document.getElementById('wood-count').innerText = inventory.wood;
            document.getElementById('stone-count').innerText = inventory.stone;
            document.getElementById('fish-count').innerText = inventory.fish;
            document.getElementById('points-count').innerText = inventory.points;
            
            const biome = getBiomeAt(dino.position.x, dino.position.z);
            document.getElementById('biome-name').innerText = `BIOME: ${biome.name}`;

            const questDiv = document.getElementById('quest-list');
            questDiv.innerHTML = quests.map(q => `
                <div style="color: ${q.complete ? '#4CAF50' : '#fff'}; font-size: 0.8em; margin-top: 4px;">
                    ${q.complete ? '✓' : '○'} ${q.text} (${q.current}/${q.target})
                </div>
            `).join('');
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 800);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.1);
            sun.position.set(200, 400, 100);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            dino = createDinoModel(0x4a5d23);
            dino.position.y = getHeight(0,0);
            scene.add(dino);

            updateChunks();

            window.addEventListener('keydown', e => { 
                keys[e.code] = true; 
                if(e.code === 'KeyE') tryEat(); 
                if(e.code === 'KeyV') viewMode = (viewMode + 1) % 3;
            });
            window.addEventListener('keyup', e => { keys[e.code] = false; });
            
            const joy = document.getElementById('joystick-wrapper');
            const knob = document.getElementById('joystick-knob');
            joy.addEventListener('touchstart', e => { joystick.active = true; updateJoystick(e.touches[0]); });
            window.addEventListener('touchmove', e => { if(joystick.active) updateJoystick(e.touches[0]); });
            window.addEventListener('touchend', () => { 
                joystick.active = false; 
                joystick.x = 0; joystick.y = 0; 
                knob.style.transform = `translate(0,0)`; 
            });
            
            function updateJoystick(touch) {
                const rect = joy.getBoundingClientRect();
                const jx = Math.max(-40, Math.min(40, touch.clientX - (rect.left + rect.width/2)));
                const jy = Math.max(-40, Math.min(40, touch.clientY - (rect.top + rect.height/2)));
                joystick.x = jx / 40;
                joystick.y = jy / 40;
                knob.style.transform = `translate(${Math.round(jx/8)*8}px, ${Math.round(jy/8)*8}px)`; 
            }

            document.getElementById('m-eat').onclick = tryEat;
            document.getElementById('m-view').onclick = () => { viewMode = (viewMode + 1) % 3; };
            window.toggleModal = (id) => {
                const m = document.getElementById(id);
                m.style.display = m.style.display === 'block' ? 'none' : 'block';
            };
            
            window.applySkin = (color, cost) => {
                if (inventory.points >= cost) {
                    inventory.points -= cost;
                    scene.remove(dino);
                    dino = createDinoModel(color);
                    dino.position.set(dino.position.x, getHeight(dino.position.x, dino.position.z), dino.position.z);
                    scene.add(dino);
                    updateUI();
                }
            };

            updateUI();
            animate();
        }

        function createDinoModel(color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color });
            const bellyMat = new THREE.MeshStandardMaterial({ color: 0xd4c49d });
            const belly = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 5), bellyMat);
            belly.position.y = 3;
            group.add(belly);
            
            group.neckRoot = new THREE.Group();
            group.neckRoot.position.set(3, 3, 0);
            group.add(group.neckRoot);
            
            let lastNeck = group.neckRoot;
            for(let i=0; i<3; i++) {
                const p = new THREE.Group();
                p.position.set(0, i === 0 ? 0 : 1.2, 0);
                const seg = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.4, 1.8), mat);
                p.add(seg);
                lastNeck.add(p);
                lastNeck = p;
            }
            group.head = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.8, 2), mat);
            group.head.position.set(0.6, 1.2, 0);
            lastNeck.add(group.head);

            const lOffs = [{x:2, z:2}, {x:2, z:-2}, {x:-2, z:2}, {x:-2, z:-2}];
            lOffs.forEach(o => {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3.5, 1.5), mat);
                leg.position.set(o.x, 1.75, o.z);
                group.add(leg);
            });
            return group;
        }

        function createTree(type) {
            const tree = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({color: 0x4b3621});
            const leafMat = new THREE.MeshStandardMaterial({color: 0x1b4d3e});
            if(type === 'oak') {
                const trunk = new THREE.Mesh(new THREE.BoxGeometry(2, 12, 2), trunkMat);
                trunk.position.y = 6; tree.add(trunk);
                const foliage = new THREE.Mesh(new THREE.BoxGeometry(7, 7, 7), leafMat);
                foliage.position.y = 12; tree.add(foliage);
            } else if(type === 'pine') {
                const trunk = new THREE.Mesh(new THREE.BoxGeometry(1.5, 15, 1.5), trunkMat);
                trunk.position.y = 7.5; tree.add(trunk);
                for(let i=0; i<3; i++) {
                    const l = new THREE.Mesh(new THREE.BoxGeometry(8-i*2, 4, 8-i*2), leafMat);
                    l.position.y = 8 + i*4; tree.add(l);
                }
            }
            tree.userData = { type: 'tree' };
            return tree;
        }

        function createMob(type, x, z) {
            const h = getHeight(x, z);
            const mob = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: type === 'cow' ? 0x8b4513 : 0xfa8072});
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 4), mat);
            body.position.y = 1.5; mob.add(body);
            mob.userData = { type, timer: 0, velocity: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).multiplyScalar(10) };
            mob.position.set(x, type === 'fish' ? h-5 : h, z);
            return mob;
        }

        function createChunk(cx, cz) {
            const group = new THREE.Group();
            group.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
            const b = getBiomeAt(cx * CHUNK_SIZE, cz * CHUNK_SIZE);
            const mat = getBlockMaterial(b.ground, b.secondary);
            const offset = CHUNK_SIZE / 2;
            for(let x = 0; x < BLOCK_RES; x++) {
                for(let z = 0; z < BLOCK_RES; z++) {
                    const lx = x * STEP - offset + STEP/2;
                    const lz = z * STEP - offset + STEP/2;
                    const wx = cx * CHUNK_SIZE + lx;
                    const wz = cz * CHUNK_SIZE + lz;
                    const h = getHeight(wx, wz);
                    const block = new THREE.Mesh(new THREE.BoxGeometry(STEP, 80, STEP), mat);
                    block.position.set(lx, h - 40, lz);
                    group.add(block);
                    
                    if(h < -10 && Math.random() < 0.08) {
                        const ore = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshStandardMaterial({color: 0x777777}));
                        ore.position.set(lx, h + 2, lz);
                        ore.userData = { type: 'stone' };
                        group.add(ore);
                    }
                    if(h > -5 && b.type !== 'ocean' && b.type !== 'desert' && Math.random() < 0.12) {
                        const t = createTree(Math.random() > 0.5 ? 'oak' : 'pine');
                        t.position.set(lx, h, lz);
                        group.add(t);
                    } else if (b.type === 'desert' && Math.random() < 0.03) {
                        // Cactus
                        const c = new THREE.Mesh(new THREE.BoxGeometry(1.5, 6, 1.5), new THREE.MeshStandardMaterial({color: 0x2e8b57}));
                        c.position.set(lx, h + 3, lz);
                        group.add(c);
                    }
                }
            }
            const mobCount = b.type === 'ocean' ? 2 : 1;
            for(let i=0; i<mobCount; i++) {
                if(Math.random() < 0.6) {
                    const mob = createMob(b.type === 'ocean' ? 'fish' : 'cow', cx*CHUNK_SIZE + (Math.random()-0.5)*CHUNK_SIZE, cz*CHUNK_SIZE + (Math.random()-0.5)*CHUNK_SIZE);
                    mobs.push(mob);
                    scene.add(mob);
                }
            }
            scene.add(group);
            return group;
        }

        function updateChunks() {
            if (!dino) return;
            const cx = Math.round(dino.position.x / CHUNK_SIZE);
            const cz = Math.round(dino.position.z / CHUNK_SIZE);
            for(let x = cx - VIEW_DISTANCE; x <= cx + VIEW_DISTANCE; x++) {
                for(let z = cz - VIEW_DISTANCE; z <= cz + VIEW_DISTANCE; z++) {
                    const key = `${x},${z}`;
                    if(!chunks.has(key)) chunks.set(key, createChunk(x, z));
                }
            }
        }

        function tryEat() {
            if(isEating) return;
            isEating = true; eatTimer = 0;
            
            for(let i=mobs.length-1; i>=0; i--) {
                if(dino.position.distanceTo(mobs[i].position) < 25) {
                    if(mobs[i].userData.type === 'fish') inventory.fish += 1;
                    else { inventory.meat += 5; updateQuest('hunt', 1); }
                    scene.remove(mobs[i]);
                    mobs.splice(i, 1);
                    updateUI();
                    return;
                }
            }

            chunks.forEach(chunk => {
                chunk.children.forEach(child => {
                    if(!child.userData || !child.visible) return;
                    const wp = new THREE.Vector3(); child.getWorldPosition(wp);
                    if(dino.position.distanceTo(wp) < 25) {
                        if(child.userData.type === 'tree') {
                            inventory.wood += 3; child.visible = false; updateQuest('gather', 3);
                        } else if(child.userData.type === 'stone') {
                            inventory.stone += 1; child.visible = false; updateQuest('mine', 1);
                        }
                        updateUI();
                    }
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            if (!dino || !renderer) return;

            let moveX = 0;
            if(keys['KeyW'] || keys['ArrowUp']) moveX = 1;
            if(keys['KeyS'] || keys['ArrowDown']) moveX = -1;
            if(keys['KeyA'] || keys['ArrowLeft']) dino.rotation.y += 2.5 * delta;
            if(keys['KeyD'] || keys['ArrowRight']) dino.rotation.y -= 2.5 * delta;
            if(joystick.active) {
                moveX = -joystick.y * 1.8;
                dino.rotation.y -= joystick.x * 4.0 * delta;
            }
            
            const isSprinting = keys['ShiftLeft'];
            const currentSpeed = (isSprinting ? 45 : 25) * activeBuffs.speed;
            if(moveX !== 0) dino.translateX(moveX * currentSpeed * delta);
            
            const targetY = getHeight(dino.position.x, dino.position.z);
            dino.position.y = THREE.MathUtils.lerp(dino.position.y, targetY, 0.15);
            
            if(isEating) {
                eatTimer += delta;
                dino.neckRoot.rotation.x = Math.sin(Math.min(eatTimer * 5, Math.PI)) * 1.2;
                if(eatTimer > 0.8) isEating = false;
            }

            mobs.forEach(m => {
                m.position.add(m.userData.velocity.clone().multiplyScalar(delta));
                const h = getHeight(m.position.x, m.position.z);
                m.position.y = THREE.MathUtils.lerp(m.position.y, m.userData.type === 'fish' ? h-5 : h, 0.1);
                if(Math.random() < 0.01) m.userData.velocity.set(Math.random()-0.5, 0, Math.random()-0.5).multiplyScalar(10);
            });
            
            updateChunks();
            if(user) syncPlayerData();
            
            if(viewMode === 0) { 
                const camDist = 60;
                camera.position.set(
                    dino.position.x - Math.cos(dino.rotation.y) * camDist,
                    dino.position.y + 40,
                    dino.position.z + Math.sin(dino.rotation.y) * camDist
                );
                camera.lookAt(dino.position.x, dino.position.y + 12, dino.position.z);
            } else if(viewMode === 1) { 
                const wp = new THREE.Vector3(); 
                dino.head.getWorldPosition(wp);
                camera.position.copy(wp);
                const target = new THREE.Vector3(10, 0, 0).applyQuaternion(dino.quaternion).add(wp);
                camera.lookAt(target);
            } else { 
                camera.position.set(dino.position.x, dino.position.y + 150, dino.position.z);
                camera.lookAt(dino.position.x, dino.position.y, dino.position.z);
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
        initMultiplayer();
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', monospace; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stats-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border: 4px solid #fff; pointer-events: auto; min-width: 150px; }
        .biome-display { font-weight: bold; color: #4CAF50; margin-bottom: 8px; font-size: 1.2em; text-transform: uppercase; }
        .action-btns { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .btn { background: #4CAF50; color: white; border: 4px solid #fff; padding: 10px 15px; font-weight: bold; cursor: pointer; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 4px solid #fff; padding: 25px; color: white; display: none; pointer-events: auto; text-align: center; min-width: 300px; }
        .craft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .craft-item { background: #333; padding: 10px; border: 4px solid #555; }
        #joystick-wrapper { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(0,0,0,0.4); border: 4px solid #fff; pointer-events: auto; border-radius: 4px; display: none; }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #fff; border-radius: 4px; }
        .mobile-buttons { position: absolute; bottom: 50px; right: 50px; display: none; flex-direction: column; gap: 15px; pointer-events: auto; }
        .m-btn { width: 80px; height: 80px; border: 4px solid #fff; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; background: rgba(0,0,0,0.6); border-radius: 4px; }
        .inventory-list { margin: 10px 0; text-align: left; background: #222; padding: 10px; border: 2px solid #444; }
        @media (max-width: 768px) { #joystick-wrapper, .mobile-buttons { display: flex; } }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="stats-panel">
            <div id="biome-name" class="biome-display">BIOME: LOADING...</div>
            <div style="color: #ffeb3b">EVO POINTS: <span id="points-count">0</span></div>
            <hr>
            <div id="quest-list"></div>
        </div>
        
        <div class="action-btns">
            <button class="btn" onclick="toggleModal('skin-shop')">SKINS</button>
        </div>

        <div id="skin-shop" class="modal">
            <h2>DINO CUSTOMIZATION</h2>
            <div class="craft-grid">
                <div class="craft-item"><b>Forest</b><br>FREE<br><button class="btn" onclick="applySkin(0x4a5d23, 0)">Apply</button></div>
                <div class="craft-item"><b>Volcano</b><br>10 Points<br><button class="btn" onclick="applySkin(0xff4400, 10)">Apply</button></div>
            </div>
            <button class="btn" onclick="toggleModal('skin-shop')" style="background:#666">CLOSE</button>
        </div>

        <div id="craft-menu" class="modal">
            <h2>INVENTORY</h2>
            <div class="inventory-list">
                🥩 FLESH: <span id="meat-count">0</span><br>
                🪵 WOOD: <span id="wood-count">0</span><br>
                🪨 STONE: <span id="stone-count">0</span><br>
                🐟 FISH: <span id="fish-count">0</span>
            </div>
            <button class="btn" onclick="toggleModal('craft-menu')" style="background:#666">CLOSE</button>
        </div>

        <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
        
        <div class="mobile-buttons">
            <div class="m-btn" onclick="toggleModal('craft-menu')" style="background:#2196F3">INV</div>
            <div class="m-btn" id="m-eat" style="background:#ff4500">ACTION</div>
            <div class="m-btn" id="m-view" style="background:#9c27b0">VIEW</div>
        </div>
    </div>
</body>
</html>
